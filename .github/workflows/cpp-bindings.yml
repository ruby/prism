name: C++ bindings

on:
  push:
    paths: &paths
      - ".github/workflows/cpp-bindings.yml"
      - "include/"
      - "src/"
      - "cpp/"
      - "*akefile*"
    branches:
      - main
      - ruby-4.0
  pull_request:
    paths: *paths

jobs:
  test:
    name: test
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: head
          bundler-cache: true
      - name: Compile prism
        run: bundle exec rake compile
      - name: Compile C++
        run: g++ -o ./cpp_test cpp/test.cpp build/static/*.o -Iinclude
      - name: Run C++
        run: ./cpp_test
