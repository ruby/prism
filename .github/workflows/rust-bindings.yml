name: Rust bindings

on:
  push:
    paths: &paths
      - ".github/workflows/rust-bindings.yml"
      - "include/**"
      - "src/**"
      - "rust/**"
      - "*akefile*"
    branches:
      - main
      - ruby-4.0
  pull_request:
    paths: *paths

env:
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: cargo:test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-wasip1
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: Run tests
        run: bundle exec rake cargo:test

      - name: Run tests with buildtime_bindgen
        run: cargo test --features buildtime_bindgen -- --nocapture
        working-directory: rust/ruby-prism-sys

      - name: Check pregenerated bindings on wasm32-wasip1
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo check --target wasm32-wasip1 --no-default-features
        working-directory: rust/ruby-prism-sys
        env:
          PRISM_LIB_DIR: "."

      - name: Run examples
        if: ${{ matrix.os != 'windows-latest' }}
        run: bundle exec rake cargo:examples

  sys-bindings:
    name: cargo:bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"
      - name: rake cargo:bindings
        run: bundle exec rake cargo:bindings
      - name: Check that the pregenerated bindings are up to date
        run: git diff --color --no-ext-diff --exit-code -- rust/ruby-prism-sys/src/bindings.rs

  lint:
    name: cargo:lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"
          components: clippy, rustfmt
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo--${{ hashFiles('**/Cargo.toml') }}
      - name: rake cargo:build
        run: bundle exec rake cargo:build
      - name: rake cargo:lint
        run: bundle exec rake cargo:lint

  sanitize:
    name: cargo:sanitize:${{ matrix.sanitizer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true
      - name: rake cargo:build
        run: bundle exec rake cargo:build
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          target: "x86_64-unknown-linux-gnu"
          components: "rust-src"
      - name: Test with sanitizer
        run: bundle exec rake cargo:sanitize:${{ matrix.sanitizer }}
