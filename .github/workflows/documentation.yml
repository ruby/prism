name: Documentation

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - ruby-4.0
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.3"
        bundler-cache: true
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
    - name: Install doxygen and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install doxygen graphviz
    - name: Generate the templates
      run: bundle exec rake templates
    - name: Check ruby coverage
      run: bundle exec rake rdoc:coverage
    - name: Check C coverage
      run: doxygen Doxyfile

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: maven
    - name: Check Java coverage
      run: mvn -f java/pom.xml -pl api -pl native install

    - name: Generate Rust documentation
      run: |
        bundle exec rake cargo:build
        cargo doc --no-deps --target-dir ../doc/rust
      working-directory: rust
